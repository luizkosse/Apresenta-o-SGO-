<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" data-density="comfortable">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SGO v2 — plataforma SaaS multi-tenant de gestão organizacional, construída pela Zello.">
  <title>SGO v2 — Uma plataforma. Múltiplas organizações.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
:root {
  --brand-50:  #FFF4F1;
  --brand-100: #FFE3DB;
  --brand-200: #FFC7B8;
  --brand-300: #FFA089;
  --brand-400: #FB7E62;
  --brand-500: #F4694D;
  --brand-600: #DE583E;
  --brand-700: #BA4732;
  --brand-800: #8E3729;
  --brand-900: #61261F;

  --accent-300: #74F2DD;
  --accent-400: #43DFC7;
  --accent-500: #1EC7AF;
  --accent-600: #16A18E;
  --accent-700: #127D6F;

  --bg:            #0F0C14;
  --bg-elevated:   #17131D;
  --surface:       #1E1826;
  --surface-2:     #231F2B;
  --surface-3:     #2B2533;
  --border:        #2E2838;
  --border-strong: #3D3548;
  --fg:            #F5F3F7;
  --fg-soft:       #D9D2DE;
  --fg-muted:      #8D8498;
  --fg-dim:        #6D6676;
  --primary:       var(--brand-500);
  --primary-hover: var(--brand-400);
  --primary-fg:    #1E1310;
  --accent:        var(--accent-400);
  --accent-fg:     #062C28;
  --ring:          var(--brand-400);

  --section-py: clamp(80px, 10vw, 144px);
  --container-px: clamp(20px, 3vw, 48px);
  --max-w: 1440px;

  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-2xl: 28px;
}

[data-theme="light"] {
  --bg:            #FBFAFC;
  --bg-elevated:   #FFFFFF;
  --surface:       #FFFFFF;
  --surface-2:     #F5F3F7;
  --surface-3:     #EBE7EE;
  --border:        #EBE7EE;
  --border-strong: #D9D2DE;
  --fg:            #231F2B;
  --fg-soft:       #524C5B;
  --fg-muted:      #6D6676;
  --fg-dim:        #8D8498;
  --primary:       var(--brand-500);
  --primary-hover: var(--brand-600);
  --primary-fg:    #FFFFFF;
  --accent:        var(--accent-600);
  --accent-fg:     #FFFFFF;
  --ring:          var(--brand-500);
}

[data-density="compact"] { --section-py: clamp(56px, 7vw, 88px); }

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background-color 280ms ease, color 280ms ease;
}

h1, h2, h3, h4, h5, h6 {
  font-family: 'Manrope', 'Inter', system-ui, sans-serif;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 0;
  color: var(--fg);
}

p { margin: 0; color: var(--fg-soft); }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; }
::selection { background: var(--brand-500); color: var(--primary-fg); }

.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

.container {
  width: 100%;
  max-width: var(--max-w);
  margin: 0 auto;
  padding-left: var(--container-px);
  padding-right: var(--container-px);
}

section.section {
  padding-top: var(--section-py);
  padding-bottom: var(--section-py);
  position: relative;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-muted);
}
.eyebrow::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--primary);
  box-shadow: 0 0 0 4px color-mix(in oklab, var(--primary) 18%, transparent);
}

.section-title { font-size: clamp(32px, 4.4vw, 56px); letter-spacing: -0.025em; margin-top: 16px; max-width: 22ch; }
.section-lede { font-size: clamp(16px, 1.4vw, 19px); line-height: 1.55; color: var(--fg-soft); max-width: 60ch; margin-top: 16px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 44px;
  padding: 0 18px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: -0.005em;
  border: 1px solid transparent;
  transition: all 180ms ease;
  white-space: nowrap;
}
.btn-primary { background: var(--primary); color: var(--primary-fg); }
.btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--fg); border-color: var(--border-strong); }
.btn-ghost:hover { background: var(--surface-2); border-color: var(--fg-muted); }

.nav {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  width: calc(100% - 32px);
  max-width: 1380px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 10px 20px;
  background: color-mix(in oklab, var(--bg-elevated) 75%, transparent);
  backdrop-filter: blur(18px) saturate(150%);
  -webkit-backdrop-filter: blur(18px) saturate(150%);
  border: 1px solid var(--border);
  border-radius: 14px;
  transition: all 240ms ease;
}
.nav.scrolled { background: color-mix(in oklab, var(--bg-elevated) 92%, transparent); box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
[data-theme="light"] .nav.scrolled { box-shadow: 0 12px 40px rgba(23,19,29,0.08); }
.nav-links { display: flex; gap: 4px; align-items: center; }
.nav-link { padding: 8px 12px; font-size: 13.5px; font-weight: 500; color: var(--fg-soft); border-radius: 8px; transition: all 160ms ease; }
.nav-link:hover { color: var(--fg); background: var(--surface-2); }
.nav-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg-soft);
  transition: all 160ms ease;
}
.icon-btn:hover { background: var(--surface-2); color: var(--fg); }
@media (max-width: 720px) { .nav-links { display: none; } }

.logo-sgo {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'Manrope', sans-serif;
  font-weight: 800; font-size: 18px;
  letter-spacing: -0.02em; color: var(--fg);
}
.logo-sgo-mark {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  border-radius: 7px;
  background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
  box-shadow: 0 4px 14px -4px color-mix(in oklab, var(--brand-500) 60%, transparent);
  position: relative;
}
.logo-sgo-mark::after {
  content: '';
  position: absolute;
  inset: 5px;
  border-radius: 4px;
  border: 1.5px solid rgba(255,255,255,0.85);
  border-right-color: transparent;
  border-bottom-color: transparent;
}
.logo-sgo-version {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 500;
  color: var(--fg-muted);
  background: var(--surface-2);
  padding: 2px 6px;
  border-radius: 4px;
}

.zello-mark {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Manrope', sans-serif;
  font-weight: 600; font-size: 12px;
  color: var(--fg-muted);
}
.zello-mark span:last-child { color: var(--fg-soft); font-weight: 700; }

.hero { padding-top: 140px; padding-bottom: 80px; position: relative; overflow: hidden; isolation: isolate; }
.hero-bg { position: absolute; inset: 0; z-index: -1; pointer-events: none; }
.hero-bg::before {
  content: '';
  position: absolute;
  top: -10%; left: 50%;
  transform: translateX(-50%);
  width: 1200px; height: 800px;
  background: radial-gradient(ellipse at center,
    color-mix(in oklab, var(--brand-500) 28%, transparent) 0%,
    color-mix(in oklab, var(--brand-700) 14%, transparent) 32%,
    transparent 70%);
  filter: blur(40px);
}
.hero-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(to right, color-mix(in oklab, var(--fg) 6%, transparent) 1px, transparent 1px),
    linear-gradient(to bottom, color-mix(in oklab, var(--fg) 6%, transparent) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
}
.hero-inner { text-align: center; display: flex; flex-direction: column; align-items: center; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 6px 6px 6px 14px;
  border-radius: 999px;
  background: color-mix(in oklab, var(--surface) 85%, transparent);
  border: 1px solid var(--border);
  font-size: 13px; color: var(--fg-soft);
  backdrop-filter: blur(8px);
}
.hero-badge-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  background: color-mix(in oklab, var(--accent) 18%, transparent);
  color: var(--accent);
  padding: 3px 8px;
  border-radius: 999px;
  font-weight: 600;
}
[data-theme="light"] .hero-badge-tag { color: var(--accent-700); background: var(--accent-300); }

.hero h1 { font-size: clamp(44px, 7.5vw, 96px); letter-spacing: -0.04em; line-height: 0.98; margin-top: 28px; max-width: 16ch; }
.hero h1 .accent-word {
  background: linear-gradient(120deg, var(--brand-300) 0%, var(--brand-500) 50%, var(--accent-400) 100%);
  -webkit-background-clip: text; background-clip: text;
  color: transparent; font-style: italic; font-weight: 600;
}
.hero-sub { font-size: clamp(17px, 1.6vw, 21px); color: var(--fg-soft); max-width: 60ch; margin-top: 28px; line-height: 1.55; }
.hero-cta { display: flex; gap: 12px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }

.hero-mock-wrap {
  margin-top: 80px; position: relative;
  width: 100%; max-width: 1320px;
  aspect-ratio: 16/9.5;
  border-radius: var(--r-2xl);
  border: 1px solid var(--border-strong);
  background: var(--surface);
  overflow: hidden;
  box-shadow: 0 -1px 0 rgba(255,255,255,0.05) inset, 0 60px 120px -30px rgba(0,0,0,0.55), 0 30px 60px -15px rgba(244,105,77,0.15);
}
[data-theme="light"] .hero-mock-wrap { box-shadow: 0 60px 120px -30px rgba(23,19,29,0.20), 0 30px 60px -15px rgba(244,105,77,0.10); }
.hero-mock-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 32px;
  background: linear-gradient(to bottom, var(--surface-2), transparent);
  z-index: 1; pointer-events: none;
  border-bottom: 1px solid var(--border);
}
.hero-mock-bar {
  position: absolute;
  top: 0; left: 0; right: 0; height: 32px;
  display: flex; align-items: center;
  padding: 0 14px; z-index: 2; gap: 6px;
}
.hero-mock-bar i { width: 10px; height: 10px; border-radius: 50%; background: var(--surface-3); }
.hero-mock-bar i:nth-child(1) { background: #ff5f57; }
.hero-mock-bar i:nth-child(2) { background: #ffbd2e; }
.hero-mock-bar i:nth-child(3) { background: #28c941; }
.hero-mock-bar .url {
  margin-left: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--fg-muted);
  background: var(--bg);
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
}

.hero-stats {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; margin-top: 80px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  width: 100%; max-width: 1320px;
}
.hero-stat { background: var(--bg); padding: 28px 24px; text-align: left; }
.hero-stat-num { font-family: 'Manrope', sans-serif; font-size: clamp(28px, 3.2vw, 40px); font-weight: 700; letter-spacing: -0.02em; color: var(--fg); line-height: 1; }
.hero-stat-label { margin-top: 8px; font-size: 13px; color: var(--fg-muted); line-height: 1.4; }
@media (max-width: 760px) { .hero-stats { grid-template-columns: repeat(2, 1fr); } }

.shift-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 24px; align-items: stretch; margin-top: 64px; }
.shift-side { display: flex; flex-direction: column; gap: 12px; padding: 28px; border-radius: var(--r-xl); border: 1px solid var(--border); background: var(--surface); position: relative; }
.shift-side.v1 { opacity: 0.78; }
.shift-side.v2 {
  background: linear-gradient(180deg, var(--surface) 0%, color-mix(in oklab, var(--brand-500) 6%, var(--surface)) 100%);
  border-color: color-mix(in oklab, var(--brand-500) 24%, var(--border));
}
.shift-side h3 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.shift-tag { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 8px; border-radius: 999px; font-weight: 600; }
.shift-tag.v1 { background: var(--surface-3); color: var(--fg-muted); }
.shift-tag.v2 { background: color-mix(in oklab, var(--brand-500) 18%, transparent); color: var(--brand-400); }
[data-theme="light"] .shift-tag.v2 { background: var(--brand-100); color: var(--brand-700); }
.shift-row { display: grid; grid-template-columns: 110px 1fr; gap: 14px; padding: 12px 0; border-top: 1px dashed var(--border); align-items: baseline; }
.shift-row:first-of-type { border-top: 0; }
.shift-row .label { font-size: 12px; color: var(--fg-muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.04em; }
.shift-row .val { font-size: 14.5px; font-weight: 500; color: var(--fg); line-height: 1.4; }
.shift-side.v1 .val { color: var(--fg-soft); text-decoration: line-through; text-decoration-color: var(--fg-dim); }
.shift-arrow { display: grid; place-items: center; width: 64px; color: var(--brand-400); position: relative; }
.shift-arrow svg { width: 40px; height: 40px; }
@media (max-width: 880px) {
  .shift-grid { grid-template-columns: 1fr; }
  .shift-arrow { transform: rotate(90deg); width: auto; padding: 12px 0; }
}

.tenant-diagram { margin-top: 64px; display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center; }
@media (max-width: 1000px) { .tenant-diagram { grid-template-columns: 1fr; } }
.tenant-stage {
  position: relative; padding: 40px;
  border-radius: var(--r-2xl);
  background:
    radial-gradient(circle at 30% 20%, color-mix(in oklab, var(--brand-500) 16%, transparent), transparent 60%),
    radial-gradient(circle at 80% 80%, color-mix(in oklab, var(--accent-500) 14%, transparent), transparent 60%),
    var(--surface);
  border: 1px solid var(--border);
  min-height: 520px;
  display: flex; flex-direction: column; gap: 14px; justify-content: center;
}
.tenant-level {
  position: relative; padding: 18px 22px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: all 220ms cubic-bezier(.2,.8,.2,1);
  text-align: left; width: 100%; font-family: inherit; color: var(--fg);
}
.tenant-level::before {
  content: ''; position: absolute;
  left: -1px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 0;
  border-radius: 0 3px 3px 0;
  background: var(--primary);
  transition: height 220ms ease;
}
.tenant-level.active {
  border-color: color-mix(in oklab, var(--brand-500) 60%, var(--border));
  background: color-mix(in oklab, var(--brand-500) 6%, var(--bg-elevated));
  transform: translateX(4px);
  box-shadow: 0 8px 24px -8px color-mix(in oklab, var(--brand-500) 40%, transparent);
}
.tenant-level.active::before { height: 60%; }
.tenant-level.l-2 { margin-left: 32px; }
.tenant-level.l-3 { margin-left: 64px; }
.tenant-level.l-4 { margin-left: 96px; }
.tenant-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: grid; place-items: center;
  background: var(--surface-2); color: var(--fg-soft);
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 14px;
}
.tenant-level.active .tenant-icon {
  background: color-mix(in oklab, var(--brand-500) 22%, transparent);
  color: var(--brand-400);
}
.tenant-meta { flex: 1; min-width: 0; }
.tenant-meta-label { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.tenant-meta-name { font-size: 15px; font-weight: 600; color: var(--fg); margin-top: 2px; }
.tenant-count {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--fg-muted);
  padding: 3px 8px;
  background: var(--surface-2);
  border-radius: 4px;
}
.tenant-detail { position: relative; min-height: 360px; }
.tenant-detail h3 { font-size: 28px; letter-spacing: -0.02em; }
.tenant-detail-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--brand-400); margin-bottom: 8px; letter-spacing: 0.04em; }
.tenant-detail p { margin-top: 16px; line-height: 1.6; }
.tenant-detail ul { list-style: none; padding: 0; margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
.tenant-detail li { font-size: 14px; color: var(--fg-soft); display: flex; gap: 12px; align-items: baseline; }
.tenant-detail li::before {
  content: ''; width: 4px; height: 4px;
  border-radius: 50%; background: var(--brand-400);
  flex-shrink: 0; transform: translateY(7px);
}
.tenant-iso {
  margin-top: 28px;
  padding: 14px 16px;
  border-radius: var(--r-md);
  background: var(--surface);
  border: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  color: var(--fg-soft);
}
.tenant-iso .key { color: var(--accent); }

.rbac-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 56px; margin-top: 64px; align-items: center; }
@media (max-width: 1000px) { .rbac-grid { grid-template-columns: 1fr; } }
.rbac-old, .rbac-new { border-radius: var(--r-xl); border: 1px solid var(--border); padding: 32px; background: var(--surface); }
.rbac-old { opacity: 0.85; }
.rbac-old h4, .rbac-new h4 { font-size: 18px; display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
.rbac-old-roles { display: flex; flex-direction: column; gap: 12px; }
.rbac-role-fixed {
  padding: 14px 16px;
  border: 1px dashed var(--border-strong);
  border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13.5px; color: var(--fg-soft);
}
.rbac-role-fixed .name { font-weight: 600; color: var(--fg); }
.rbac-role-fixed .perms { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--fg-muted); }

.rbac-matrix {
  display: grid; grid-template-columns: 160px repeat(4, 1fr);
  gap: 1px; background: var(--border);
  border-radius: var(--r-md);
  overflow: hidden; border: 1px solid var(--border);
}
.rbac-cell, .rbac-head, .rbac-row-label { background: var(--surface); padding: 10px 12px; font-size: 12px; }
.rbac-head, .rbac-row-label {
  font-family: 'JetBrains Mono', monospace;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-size: 10.5px;
  font-weight: 600;
  background: var(--surface-2);
}
.rbac-row-label { text-transform: none; letter-spacing: 0; font-family: 'Inter'; font-size: 13px; color: var(--fg); }
.rbac-cell { display: grid; place-items: center; }
.rbac-cell .dot { width: 14px; height: 14px; border-radius: 4px; background: var(--surface-3); }
.rbac-cell.on .dot { background: var(--brand-500); box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand-500) 16%, transparent); }
.rbac-cell.partial .dot { background: var(--accent-500); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent-500) 16%, transparent); }

.features-grid { margin-top: 56px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
.feature-card {
  border-radius: var(--r-xl);
  border: 1px solid var(--border);
  background: var(--surface);
  padding: 28px;
  position: relative;
  overflow: hidden;
  transition: all 220ms ease;
  display: flex; flex-direction: column;
  gap: 16px; min-height: 320px;
}
.feature-card:hover { border-color: var(--border-strong); transform: translateY(-2px); }
.feature-card.col-3 { grid-column: span 3; }
.feature-card.col-2 { grid-column: span 2; }

.mini-chat-ch { display: flex; align-items: center; gap: 6px; padding: 5px 7px; border-radius: 5px; font-size: 11px; color: var(--fg-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.av-mini { width: 16px; height: 16px; border-radius: 50%; display: grid; place-items: center; color: white; font-weight: 700; font-size: 8px; flex-shrink: 0; }

.mini-chat-h .ch-scope { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--fg-muted); letter-spacing: 0.04em; }
.mini-msgs { display: flex; flex-direction: column; gap: 8px; padding: 10px 12px; overflow: hidden; }
.mini-msg { display: grid; grid-template-columns: 18px 1fr; gap: 8px; align-items: flex-start; }

.mini-msg-b { font-size: 11px; color: var(--fg-soft); line-height: 1.4; margin-top: 1px; }
.mini-chat-input { padding: 8px 12px; border-top: 1px solid var(--border); background: var(--surface); font-size: 11px; color: var(--fg-muted); }

.mini-chart { position: absolute; inset: 16px; display: flex; flex-direction: column; gap: 8px; justify-content: flex-end; }
.mini-chart-row { display: flex; align-items: flex-end; gap: 4px; height: 28px; }

.mini-audit { position: absolute; inset: 16px; display: flex; flex-direction: column; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; overflow: hidden; }
.mini-audit-row { display: flex; gap: 8px; align-items: center; padding: 4px 6px; border-radius: 4px; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--fg-soft); }

.stack-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 56px; }

.stack-pills { display: flex; flex-wrap: wrap; gap: 8px; }

.stack-section-h { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-muted); margin: 24px 0 12px; display: flex; align-items: center; gap: 12px; }
.stack-section-h::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.stack-section-h:first-child { margin-top: 0; }

.code-window { border-radius: var(--r-xl); border: 1px solid var(--border); background: var(--bg-elevated); overflow: hidden; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; }
.code-head { padding: 12px 16px; background: var(--surface-2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--fg-muted); }

.code-body .ln.dim { color: var(--fg-muted); }
.tk-kw { color: #FB7E62; }
.tk-fn { color: #74F2DD; }
.tk-st { color: #87C7FF; }
.tk-co { color: var(--fg-muted); font-style: italic; }
.tk-ty { color: #C084FC; }
.tk-pr { color: #FFD055; }

.mcp-callout { margin-top: 24px; padding: 20px 24px; border-radius: var(--r-lg); border: 1px solid color-mix(in oklab, var(--accent-500) 30%, var(--border)); background: linear-gradient(135deg, color-mix(in oklab, var(--accent-500) 8%, transparent), transparent 50%), var(--surface); display: flex; gap: 16px; align-items: center; }
.mcp-icon { width: 44px; height: 44px; border-radius: 10px; display: grid; place-items: center; background: color-mix(in oklab, var(--accent-500) 18%, transparent); color: var(--accent); flex-shrink: 0; }
.mcp-callout h4 { font-size: 16px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.mcp-callout p { font-size: 13.5px; line-height: 1.5; }
.mcp-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; background: color-mix(in oklab, var(--accent-500) 18%, transparent); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-weight: 600; }

.roadmap-track { margin-top: 56px; position: relative; display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
.roadmap-track::before { content: ''; position: absolute; top: 28px; left: 16px; right: 16px; height: 1px; background: repeating-linear-gradient(to right, var(--border) 0 8px, transparent 8px 14px); }
.roadmap-step { position: relative; padding-top: 64px; }
.roadmap-step::before { content: ''; position: absolute; top: 22px; left: 8px; width: 12px; height: 12px; border-radius: 50%; background: var(--surface-2); border: 2px solid var(--border-strong); }
.roadmap-step.done::before { background: color-mix(in oklab, var(--brand-500) 70%, var(--fg-dim)); border-color: color-mix(in oklab, var(--brand-500) 70%, var(--fg-dim)); }
.roadmap-step.now::before { background: var(--accent-500); border-color: var(--accent-500); box-shadow: 0 0 0 5px color-mix(in oklab, var(--accent-500) 18%, transparent); animation: pulseDot 2.4s ease-in-out infinite; }
.roadmap-step.next::before { background: var(--bg); border-color: var(--brand-500); }
@keyframes pulseDot {
  0%, 100% { box-shadow: 0 0 0 5px color-mix(in oklab, var(--brand-500) 18%, transparent); }
  50%      { box-shadow: 0 0 0 8px color-mix(in oklab, var(--brand-500) 10%, transparent); }
}
.roadmap-quarter { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-muted); margin-bottom: 6px; }
.roadmap-step h4 { font-size: 17px; letter-spacing: -0.01em; }
.roadmap-step p { font-size: 13.5px; margin-top: 8px; line-height: 1.5; }
.roadmap-step.done .roadmap-quarter { color: var(--fg-muted); }
.roadmap-step.now .roadmap-quarter { color: var(--accent); }
.roadmap-step.done h4 { color: var(--fg-soft); }
.roadmap-step.done p { color: var(--fg-muted); }
@media (max-width: 1100px) { .roadmap-track { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 760px) { .roadmap-track { grid-template-columns: repeat(2, 1fr); } .roadmap-track::before { display: none; } }
@media (max-width: 480px) { .roadmap-track { grid-template-columns: 1fr; } }

.cta {
  text-align: center; padding: 80px 24px;
  border-radius: var(--r-2xl);
  border: 1px solid var(--border);
  background:
    radial-gradient(ellipse at 30% 0%, color-mix(in oklab, var(--brand-500) 22%, transparent), transparent 50%),
    radial-gradient(ellipse at 80% 100%, color-mix(in oklab, var(--accent-500) 14%, transparent), transparent 60%),
    var(--surface);
  position: relative; overflow: hidden;
}
.cta::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, color-mix(in oklab, var(--fg) 4%, transparent) 1px, transparent 1px),
    linear-gradient(to bottom, color-mix(in oklab, var(--fg) 4%, transparent) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  pointer-events: none;
}
.cta-inner { position: relative; }
.cta h2 { font-size: clamp(36px, 5vw, 64px); letter-spacing: -0.03em; max-width: 18ch; margin: 0 auto; }
.cta p { font-size: 18px; margin-top: 20px; color: var(--fg-soft); max-width: 50ch; margin-left: auto; margin-right: auto; }
.cta-actions { display: flex; gap: 12px; justify-content: center; margin-top: 36px; flex-wrap: wrap; }

.footer { margin-top: 80px; padding: 48px 0 32px; border-top: 1px solid var(--border); }
.footer-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 32px; flex-wrap: wrap; }
.footer-col h5 { font-size: 11px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-muted); margin-bottom: 12px; }

.footer-col a { font-size: 14px; color: var(--fg-soft); transition: color 160ms; }

.footer-bottom { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; font-size: 13px; color: var(--fg-muted); }

.reveal { opacity: 0; transform: translateY(24px); transition: opacity 700ms cubic-bezier(.2,.8,.2,1), transform 700ms cubic-bezier(.2,.8,.2,1); }
.reveal.in { opacity: 1; transform: none; }
@media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; transition: none; } html { scroll-behavior: auto; } }

/* DevStory */
.ds-stats { margin-top: 56px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.ds-stat { padding: 24px 22px; min-height: 200px; display: flex; flex-direction: column; justify-content: space-between; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--r-xl); position: relative; overflow: hidden; }

@media (max-width: 520px) { .ds-stats { grid-template-columns: 1fr; } }

.ds-grid { margin-top: 40px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 28px; }
@media (max-width: 1000px) { .ds-grid { grid-template-columns: 1fr; } }
.ds-flow { padding: 28px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--r-xl); }
.ds-flow-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }

.ds-flow-list { list-style: none; padding: 0; margin: 24px 0 0; display: flex; flex-direction: column; gap: 18px; position: relative; }
.ds-flow-list::before { content: ''; position: absolute; left: 14px; top: 30px; bottom: 30px; width: 1px; background: linear-gradient(180deg, color-mix(in oklab, var(--brand-500) 40%, transparent), color-mix(in oklab, var(--accent-500) 30%, transparent)); }
.ds-flow-step { display: grid; grid-template-columns: 30px 1fr; gap: 14px; position: relative; z-index: 1; }
.ds-flow-num { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); border: 1px solid color-mix(in oklab, var(--brand-500) 35%, transparent); color: var(--brand-400); font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; display: grid; place-items: center; }
.ds-flow-k { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; }
.ds-flow-t { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 16px; color: var(--fg); margin-top: 2px; }
.ds-flow-step p { font-size: 13.5px; line-height: 1.55; color: var(--fg-soft); margin-top: 4px; }
.ds-flow-foot { margin-top: 24px; padding-top: 16px; border-top: 1px dashed var(--border); display: flex; flex-wrap: wrap; gap: 8px; font-size: 11.5px; color: var(--fg-muted); }
.ds-flow-foot .sep { color: var(--fg-dim); }
.ds-voices { display: flex; flex-direction: column; gap: 16px; }
.ds-quote { position: relative; padding: 24px 24px 22px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--r-xl); margin: 0; overflow: hidden; }
.ds-quote.tone-a::before, .ds-quote.tone-b::before { content: ''; position: absolute; inset: 0 auto 0 0; width: 2px; }
.ds-quote.tone-a::before { background: var(--brand-500); }

.ds-role { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--fg-muted); letter-spacing: 0.04em; }
.ds-av { width: 36px; height: 36px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 13px; flex-shrink: 0; }
.ds-av.av-a { background: linear-gradient(135deg, var(--brand-500), var(--brand-700)); }
.ds-av.av-b { background: linear-gradient(135deg, #1EC7AF, #127D6F); }

.mt-clilist { display: flex; flex-direction: column; gap: 4px; flex: 1; min-height: 0; }
.mt-cli { display: grid; grid-template-columns: 24px 1fr auto auto; gap: 10px; align-items: center; padding: 6px 8px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); }
.mt-cli-badge { width: 24px; height: 24px; border-radius: 5px; background: var(--surface-2); color: var(--fg-soft); font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 9px; display: grid; place-items: center; }
.mt-cli-name { font-size: 11.5px; font-weight: 500; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mt-cli-mem { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--fg-muted); }
.mt-cli-on { font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 1.5px 5px; border-radius: 999px; background: var(--surface-2); color: var(--fg-muted); min-width: 36px; text-align: center; }
.mt-cli-on.live { color: var(--accent); background: color-mix(in oklab, var(--accent-500) 12%, transparent); }
.mt-cli-on.live::before { content:''; display:inline-block; width:5px; height:5px; border-radius:50%; background: var(--accent); margin-right: 4px; vertical-align: middle; }
.mt-strip { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-muted); }
.mt-strip .v { color: var(--fg); }
.mt-strip .k { color: var(--fg-muted); }
.mt-strip .sep { color: var(--fg-dim); margin: 0 4px; }
.mt-strip .right { margin-left: auto; color: var(--fg-soft); }
.mt-strip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-500); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent-500) 22%, transparent); animation: mt-pulse 2s ease-in-out infinite; }
@keyframes mt-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
@media (max-width: 760px) { .mock-tenants { padding: 52px 16px 16px; } .mt-orgs { grid-template-columns: 1fr; } }
  </style>

function App() {
  const [theme, setTheme] = useState('dark');
  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    document.documentElement.dataset.density = 'comfortable';
  }, [theme]);
  useEffect(() => {
    const els = document.querySelectorAll('.reveal:not(.in)');
    if (!('IntersectionObserver' in window)) {
      els.forEach(e => e.classList.add('in'));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
